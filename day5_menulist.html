<!DOCTYPE html>
<html lang="en">
<head>
    <title>Menu Bar</title>
    <style>
    ul{
        list-style-type: none;
    }
    a{
        text-decoration: none;
        color: rgb(244, 238, 238);
    }
    li{
        display: inline-block;
        padding: 2%;
    }
    li:hover{
        background-color: rgb(36, 101, 121);
    }
    header{
        background-color: rgb(153, 141, 98);
    }
    .logo_img {
        display: inline-block;
        width: 40%;
    }
    .logo_img img{
        width: 50px;
    }
    .logo_img p
    {
        display: inline-block;
    }
    .logo_img span{
        color:rgb(9, 65, 51);
    }
    nav
    {
        display: inline-block;
        width: 40%;
    }

    </style>
</head>
    <body>
        <header>
            <div class="menu_bar">
                <div class="logo_img">
                    <img src="../img/logo.jpg">
                    <p>
                        <span>Database Storage</span><br>
                            System
                    </p>
                </div>
                <nav>
                    <ul>
                        <li><a href="#">Home</a></li>
                        <li><a href="day2_html_structure.html">About Us</a></li>
                        <li><a href="day1_new_html.html">Contact</a></li>
                        <li><a href="day3_table.html">Gallery</a></li>
                    </ul>
                </nav>
            </div>
        </header>
    </body>

</html>

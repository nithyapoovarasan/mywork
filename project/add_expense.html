<!DOCTYPE html>
<html>
    <head>
        <title>Add Expense</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #b0a7a7;
            }
        form {
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            width: 300px;
            background: #fff;
            }
        input, textarea, button {
            margin: 10px;
            padding: 8px;
            width: 90%;
            }
    </style>
    </head>
<body>
    <h2>Add New Expense</h2>
        <form action="add_expense.php" method="post">
            <input type="text" name="category" placeholder="Category(Food,Travel)" required><br>
            <input type="number" name="amount" step="0.01"  placeholder="Amount" required><br>
            <textarea name="note" placeholder="Note(optional)"></textarea><br>
            <input type="date" name="expense_date" required><br>
            <button type="submit">Save Expense</button>
            
        </form>
</body>
</html>

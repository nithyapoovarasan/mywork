<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JavaScript</title>
    <script>
        let i=0;
        while(i<10)
        {
            console.log(i);
            i++;
        }
        let j=10;
        while(j<14)
        {
            console.log(j);
            j++;
        }
        while(i<20)
        {
            i++;
            console.log("during while loop "+i)
            if(i>15)
                console.log("during continue while loop "+i);
                continue;     
        }
        for(let i=0;i<10;i++)
        {
            console.log(i);
        }
        i=10;

        do {
            console.log("before increment i value "+i);
            i++;
            console.log("after increment i value in dowhile "+i);    
        } while (i<20);
    </script>
</head>

</body>
</html>
